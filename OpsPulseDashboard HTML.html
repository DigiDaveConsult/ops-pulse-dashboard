<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ops Pulse Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0f16; --surface: #151923; --surface2: #1c2130; --border: #252b3b;
  --text: #e2e8f0; --text2: #94a3b8; --text3: #4a5568; --mono: 'JetBrains Mono', monospace;
  --teal: #0ea5a0; --teal-bg: #0ea5a015; --purple: #a78bfa; --purple-bg: #a78bfa12;
  --green: #10b981; --yellow: #f59e0b; --orange: #f97316; --red: #ef4444; --blue: #3b82f6;
  --green-bg: #10b98115; --yellow-bg: #f59e0b15; --red-bg: #ef444415;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',system-ui,sans-serif; min-height:100vh; }
select,button,input { font-family:'DM Sans',sans-serif; }
.mono { font-family:var(--mono); }

/* HEADER */
.header { background:linear-gradient(135deg, var(--surface) 0%, var(--bg) 100%); border-bottom:1px solid var(--border); padding:20px 32px; }
.header-inner { max-width:1400px; margin:0 auto; }
.header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:12px; }
.header-badge { display:flex; align-items:center; gap:10px; margin-bottom:4px; }
.header-dot { width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 8px #10b98166; }
.header-label { font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--text3); }
.header h1 { font-size:22px; font-weight:700; color:var(--text); }
.header-right { display:flex; align-items:center; gap:16px; flex-wrap:wrap; }

/* DATE RANGE PICKER */
.date-range { display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:6px 12px; }
.date-range label { font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text3); }
.date-range input[type="date"] { background:transparent; border:1px solid var(--border); border-radius:4px; padding:4px 8px; color:var(--text); font-family:var(--mono); font-size:12px; outline:none; }
.date-range input[type="date"]:focus { border-color:var(--teal); }
.date-range span { color:var(--text3); font-size:12px; }

/* FILTERS */
.filters { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; }
.filter-group { display:flex; flex-direction:column; gap:4px; }
.filter-label { font-size:10px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; color:var(--text3); }
.filter-select { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:6px 10px; color:var(--text); font-size:13px; cursor:pointer; outline:none; min-width:140px; }
.filter-select:focus { border-color:var(--teal); }
.clear-btn { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:6px 14px; color:var(--text2); font-size:12px; font-weight:600; cursor:pointer; height:33px; }
.clear-btn:hover { background:var(--border); }
.filter-info { font-size:12px; color:var(--yellow); font-weight:500; padding-bottom:6px; }

/* TABS */
.tabs-wrap { max-width:1400px; margin:0 auto; padding:20px 32px 0; }
.tabs { display:flex; gap:4px; border-bottom:1px solid var(--border); }
.tab { padding:10px 20px; font-size:14px; font-weight:600; background:transparent; color:var(--text3); border:1px solid transparent; border-bottom:none; border-radius:8px 8px 0 0; cursor:pointer; margin-bottom:-1px; transition:all 0.2s; }
.tab:hover { color:var(--text2); }
.tab.active { background:var(--surface); color:var(--text); border-color:var(--border); border-bottom-color:var(--bg); }

/* CONTENT */
.content { max-width:1400px; margin:0 auto; padding:0 32px 40px; }
.hidden { display:none !important; }

/* KPI GRID */
.kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
.kpi-card { background:var(--surface); border-radius:12px; padding:20px; border:1px solid var(--border); position:relative; overflow:hidden; }
.kpi-bar { position:absolute; top:0; left:0; right:0; height:3px; }
.kpi-label { font-size:10px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--text3); margin-bottom:8px; display:flex; align-items:center; gap:8px; }
.kpi-value { font-size:28px; font-weight:700; color:var(--text); font-family:var(--mono); margin-bottom:4px; display:flex; align-items:baseline; gap:8px; }
.kpi-desc { font-size:11px; font-weight:600; padding:2px 8px; border-radius:10px; }
.kpi-sub { font-size:12px; color:var(--text3); margin-bottom:8px; }

/* SPARKLINE */
.sparkline-wrap { height:32px; margin-top:8px; }
.sparkline-wrap svg { width:100%; height:32px; }
.spark-line { fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.spark-area { opacity:0.15; }
.spark-dot { r:3; }

/* HEALTH ROW */
.health-row { display:flex; gap:12px; align-items:center; margin-top:4px; }
.health-item { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text2); }
.health-box { width:28px; height:28px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:14px; font-weight:700; }

/* CLIENT TABLE */
.card { background:var(--surface); border-radius:12px; border:1px solid var(--border); padding:24px; margin-bottom:20px; }
.card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.card h3 { font-size:16px; font-weight:600; color:var(--text); margin:0; }
.card-sub { font-size:12px; color:var(--text3); }

table { width:100%; border-collapse:collapse; }
th { padding:10px 14px; text-align:left; font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text3); border-bottom:1px solid var(--border); }
.crow { border-bottom:1px solid #1e2235; cursor:pointer; transition:background 0.15s; }
.crow:hover { background:var(--surface2); }
.crow.exp { background:var(--surface2); border-bottom:none; }
td { padding:12px 14px; font-size:13px; color:var(--text2); }

/* PILLS & BLOCKS */
.pill { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:16px; font-size:12px; font-weight:600; }
.pill-dot { width:7px; height:7px; border-radius:50%; }
.blocks { display:flex; gap:2px; }
.block { width:12px; height:12px; border-radius:2px; }
.mini-pill { font-size:10px; font-weight:600; padding:2px 8px; border-radius:10px; }

/* PROJECT EXPAND */
.expand-panel { padding:0; background:transparent; }
.expand-inner { padding:12px 16px 16px; background:var(--bg); border-radius:8px; border:1px solid #1e2235; margin:4px 14px 12px; }
.expand-lbl { font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text3); margin-bottom:12px; }
.proj-card { padding:12px 16px; background:var(--surface); border-radius:8px; border:1px solid var(--border); margin-bottom:8px; }
.proj-card:last-child { margin-bottom:0; }
.proj-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.proj-name { font-size:14px; font-weight:600; color:var(--text); }
.proj-badges { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.proj-metrics { display:grid; grid-template-columns:repeat(3,auto); gap:16px; font-size:12px; }
.proj-metric-label { color:var(--text3); font-size:10px; text-transform:uppercase; letter-spacing:0.5px; }
.proj-metric-val { font-family:var(--mono); font-size:14px; font-weight:600; }

/* SKIP SUMMARY */
.skip-summary { background:var(--surface); border-radius:12px; border:1px solid var(--border); padding:20px; margin-bottom:20px; }
.skip-row { display:flex; gap:16px; padding:6px 0; border-bottom:1px solid #1e2235; font-size:13px; }
.skip-row:last-child { border-bottom:none; }

/* AI TAB */
.ai-banner { display:flex; align-items:center; gap:12px; margin-bottom:20px; padding:14px 18px; background:linear-gradient(135deg, var(--surface), #1e1535); border-radius:10px; border:1px solid #2d2148; }
.ai-btn { background:linear-gradient(135deg, #7c3aed, #6d28d9); border:none; border-radius:8px; padding:10px 20px; color:white; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:8px; transition:opacity 0.2s; }
.ai-btn:hover { opacity:0.9; }
.ai-btn:disabled { opacity:0.5; cursor:not-allowed; }
.ai-range { display:flex; align-items:center; gap:8px; margin-left:auto; }
.ai-range label { font-size:11px; color:var(--text3); font-weight:600; text-transform:uppercase; letter-spacing:1px; }
.ai-range select { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:4px 8px; color:var(--text); font-size:13px; }
.ai-loading { text-align:center; padding:40px; color:var(--purple); font-size:14px; }
.ai-loading .spinner { display:inline-block; width:20px; height:20px; border:2px solid var(--purple); border-top-color:transparent; border-radius:50%; animation:spin 0.8s linear infinite; margin-right:8px; vertical-align:middle; }
@keyframes spin { to { transform:rotate(360deg); } }

.two-col { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
.theme-card { padding:14px 16px; border-radius:10px; background:var(--bg); border:1px solid #1e2235; margin-bottom:10px; }
.theme-card:last-child { margin-bottom:0; }
.theme-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.theme-count { font-size:10px; font-weight:700; padding:2px 8px; border-radius:6px; }
.theme-detail { font-size:12px; color:var(--text3); }

.risk-card { padding:12px 16px; border-radius:10px; background:var(--bg); border:1px solid #1e2235; margin-bottom:8px; cursor:pointer; }
.risk-card:last-child { margin-bottom:0; }
.risk-top { display:flex; justify-content:space-between; align-items:center; }
.risk-expand { margin-top:8px; padding-top:8px; border-top:1px solid #1e2235; font-size:13px; color:var(--text2); line-height:1.6; }
.sev-badge { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:3px 8px; border-radius:6px; }

.opp-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.opp-card { padding:14px 16px; border-radius:10px; background:var(--bg); border:1px solid #1e2235; }
.opp-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }

.ai-section { margin-bottom:16px; }
.ai-section-title { font-size:13px; font-weight:600; color:var(--purple); margin-bottom:8px; display:flex; align-items:center; gap:6px; }
.ai-prose { font-size:14px; line-height:1.7; color:var(--text2); }

/* INDIVIDUAL RESPONSES */
.detail-card { background:var(--surface); border-radius:12px; border:1px solid var(--border); padding:20px; margin-bottom:14px; }
.detail-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.detail-name { font-size:15px; font-weight:600; color:var(--text); }
.detail-sub { font-size:12px; color:var(--text3); margin-top:2px; }
.status-badge { font-size:12px; font-weight:600; padding:4px 12px; border-radius:16px; }
.metrics-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:14px; }
.metric { padding:10px 14px; border-radius:8px; background:var(--bg); border:1px solid #1e2235; }
.metric-lbl { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text3); margin-bottom:4px; }
.metric-val { font-size:16px; font-weight:700; font-family:var(--mono); }
.text-field { margin-bottom:10px; }
.text-field:last-child { margin-bottom:0; }
.text-field-lbl { font-size:12px; font-weight:600; color:var(--text3); margin-bottom:4px; }
.text-field-val { font-size:13px; color:var(--text2); line-height:1.6; padding:10px 14px; background:var(--bg); border-radius:8px; border:1px solid #1e2235; }

/* EMPTY STATE */
.empty { padding:60px; text-align:center; color:var(--text3); background:var(--surface); border-radius:12px; border:1px solid var(--border); font-size:14px; }

/* LOADING */
.page-loading { display:flex; flex-direction:column; align-items:center; justify-content:center; height:60vh; gap:16px; }
.page-loading .spinner { width:32px; height:32px; border:3px solid var(--teal); border-top-color:transparent; border-radius:50%; animation:spin 0.8s linear infinite; }

/* DATA STATUS */
.data-status { font-size:11px; color:var(--text3); display:flex; align-items:center; gap:6px; }
.data-status .dot { width:6px; height:6px; border-radius:50%; }

/* RESPONSIVE */
@media (max-width:900px) {
  .kpi-grid { grid-template-columns:repeat(2,1fr); }
  .two-col, .opp-grid { grid-template-columns:1fr; }
  .metrics-grid { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div>
        <div class="header-badge">
          <div class="header-dot" id="statusDot"></div>
          <span class="header-label">Ops Pulse</span>
        </div>
        <h1>Pulse Check Dashboard</h1>
      </div>
      <div class="header-right">
        <div class="date-range">
          <label>From</label>
          <input type="date" id="dateFrom" onchange="onDateChange()">
          <span>→</span>
          <label>To</label>
          <input type="date" id="dateTo" onchange="onDateChange()">
        </div>
        <div class="data-status" id="dataStatus">
          <div class="dot" style="background:var(--text3)"></div>
          <span>Loading...</span>
        </div>
      </div>
    </div>
    <div class="filters">
      <div class="filter-group"><label class="filter-label">Industry</label><select id="fI" class="filter-select" onchange="render()"></select></div>
      <div class="filter-group"><label class="filter-label">Practice Area</label><select id="fP" class="filter-select" onchange="render()"></select></div>
      <div class="filter-group"><label class="filter-label">Client</label><select id="fC" class="filter-select" onchange="render()"></select></div>
      <div class="filter-group"><label class="filter-label">Project</label><select id="fPrj" class="filter-select" onchange="render()"></select></div>
      <div class="filter-group"><label class="filter-label">Role</label><select id="fR" class="filter-select" onchange="render()"></select></div>
      <button id="clearBtn" class="clear-btn hidden" onclick="clearFilters()">✕ Clear</button>
      <span id="filterInfo" class="filter-info hidden"></span>
    </div>
  </div>
</div>

<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" data-tab="overview" onclick="switchTab('overview')">Overview</button>
    <button class="tab" data-tab="ai" onclick="switchTab('ai')">🤖 AI Insights</button>
    <button class="tab" data-tab="detail" onclick="switchTab('detail')">Individual Responses</button>
  </div>
</div>

<div class="content">
  <div id="loadingState" class="page-loading">
    <div class="spinner"></div>
    <div style="color:var(--text2);font-size:14px">Connecting to SharePoint...</div>
  </div>
  <div id="overviewTab" class="hidden"></div>
  <div id="aiTab" class="hidden"></div>
  <div id="detailTab" class="hidden"></div>
</div>

<script>
// ============================================================
// CONFIGURATION
// ============================================================
const SP_SITE = "https://digineer.sharepoint.com/sites/Digineer-EngagementManagement";
const SUBMISSIONS_LIST = "Test_InternalValue_Submissions";
const CONSULTANTS_LIST = "Test_InternalValue_ConsultantsList";

// Claude API - set your key here (internal use only)
const CLAUDE_API_KEY = "YOUR_API_KEY_HERE";
const CLAUDE_MODEL = "claude-sonnet-4-5-20250929";

// ============================================================
// STATE
// ============================================================
let ALL_DATA = [];
let CONSULTANTS = [];
let currentTab = 'overview';
let expandedClient = null;
let expandedRisk = null;
let aiCache = {};
let aiResult = null;
let isLoadingAI = false;
let dataLoaded = false;

// ============================================================
// SCALE LABELS & COLORS
// ============================================================
const TONE_LABELS = { 1:'Challenging', 2:'Stable', 3:'Positive', 4:'Collaborative' };
const CONF_LABELS = { 1:'At Risk', 2:'Concerning', 3:'Stable But Watchful', 4:'On Track', 5:'Strong' };
const BW_LABELS = { 1:'Buried', 2:'Heavy', 3:'Busy', 4:'Good', 5:'Open' };

function scaleColor(val, max) {
  if (max === 4) {
    if (val <= 1.5) return 'var(--red)';
    if (val <= 2.5) return 'var(--yellow)';
    if (val <= 3.2) return 'var(--green)';
    return '#059669';
  }
  if (val <= 1.5) return 'var(--red)';
  if (val <= 2.5) return 'var(--orange)';
  if (val <= 3.5) return 'var(--yellow)';
  if (val <= 4.2) return 'var(--green)';
  return '#059669';
}

function scaleLabel(val, map) {
  const rounded = Math.round(val);
  return map[rounded] || '—';
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ============================================================
// SHAREPOINT DATA FETCH
// ============================================================
async function fetchSPList(listName, select, top) {
  const url = `${SP_SITE}/_api/web/lists/getbytitle('${listName}')/items?$top=${top||500}&$select=${select}`;
  const resp = await fetch(url, { headers: { 'Accept': 'application/json;odata=nometadata' }, credentials: 'include' });
  if (!resp.ok) throw new Error(`SP fetch failed: ${resp.status} ${resp.statusText}`);
  const data = await resp.json();
  return data.value;
}

async function loadData() {
  try {
    document.getElementById('dataStatus').innerHTML = '<div class="dot" style="background:var(--yellow)"></div><span>Fetching data...</span>';

    // Fetch submissions
    const subFields = 'Id,ConsultantName,Client,Industry,PracticeArea,Role,ProjectDescription,PromptVersion,ResponseStatus,SubmissionDate,' +
      'ClientTone,EngagementConfidence,Bandwidth,LeadershipKnow,WhatWouldChange,WhatHeard,SkipReason,' +
      'ProjectHealth,ClientHealth,TeamSentiment,WeeklyHighlight,RiskNarrative,OpportunitySignal';
    const rawSubs = await fetchSPList(SUBMISSIONS_LIST, subFields, 2000);

    // Fetch consultants
    const conFields = 'Id,ConsultantName,ConsultantEmail,Client,ManagerEmail,ProjectDescription,Industry,PracticeArea,Role,IsActive';
    const rawCons = await fetchSPList(CONSULTANTS_LIST, conFields, 200);

    CONSULTANTS = rawCons.map(c => ({
      name: c.ConsultantName,
      email: c.ConsultantEmail,
      client: c.Client,
      manager: c.ManagerEmail,
      project: c.ProjectDescription || '',
      industry: extractChoice(c.Industry),
      practiceArea: extractChoice(c.PracticeArea),
      role: extractChoice(c.Role),
      active: c.IsActive
    }));

    // Normalize submissions
    ALL_DATA = rawSubs.map(s => {
      const isV2 = s.PromptVersion === 2 || s.PromptVersion === '2';
      return {
        id: s.Id,
        consultant: s.ConsultantName || '',
        client: s.Client || '',
        industry: extractChoice(s.Industry) || '',
        practiceArea: extractChoice(s.PracticeArea) || '',
        role: extractChoice(s.Role) || '',
        project: s.ProjectDescription || '',
        version: isV2 ? 2 : 1,
        status: s.ResponseStatus || 'Completed',
        date: s.SubmissionDate ? new Date(s.SubmissionDate) : null,
        // V2 fields
        clientTone: isV2 ? parseNum(s.ClientTone) : null,
        engagementConfidence: isV2 ? parseNum(s.EngagementConfidence) : null,
        bandwidth: parseNum(s.Bandwidth),
        leadershipKnow: s.LeadershipKnow || '',
        whatWouldChange: s.WhatWouldChange || '',
        whatHeard: s.WhatHeard || '',
        skipReason: s.SkipReason || '',
        // V1 fields (backward compat)
        projectHealth: s.ProjectHealth || null,
        clientHealth: s.ClientHealth || null,
        teamSentiment: parseNum(s.TeamSentiment),
        highlight: s.WeeklyHighlight || '',
        risk: s.RiskNarrative || '',
        opportunity: s.OpportunitySignal || ''
      };
    }).sort((a, b) => (b.date || 0) - (a.date || 0));

    dataLoaded = true;
    setDateDefaults();
    populateFilters();
    document.getElementById('loadingState').classList.add('hidden');
    document.getElementById('overviewTab').classList.remove('hidden');
    document.getElementById('dataStatus').innerHTML = `<div class="dot" style="background:var(--green)"></div><span>${ALL_DATA.length} records loaded</span>`;
    document.getElementById('statusDot').style.background = 'var(--green)';
    render();
  } catch (err) {
    console.error('Data load error:', err);
    document.getElementById('loadingState').innerHTML = `
      <div style="text-align:center;color:var(--red);font-size:14px">
        <div style="font-size:18px;margin-bottom:8px">⚠ Connection Error</div>
        <div style="color:var(--text2);margin-bottom:16px">${esc(err.message)}</div>
        <div style="color:var(--text3);font-size:12px">Make sure you're logged into SharePoint and have access to the Engagement Management site.</div>
        <button onclick="loadData()" style="margin-top:16px;padding:8px 20px;background:var(--teal);color:white;border:none;border-radius:6px;cursor:pointer;font-weight:600">Retry</button>
      </div>`;
    document.getElementById('dataStatus').innerHTML = '<div class="dot" style="background:var(--red)"></div><span>Connection failed</span>';
  }
}

function extractChoice(val) {
  if (!val) return '';
  if (typeof val === 'string') return val;
  if (val.Value) return val.Value;
  if (val['@odata.type']) return val.Value || '';
  return String(val);
}

function parseNum(v) {
  if (v === null || v === undefined || v === '') return null;
  const n = Number(v);
  return isNaN(n) ? null : n;
}

// ============================================================
// DATE & FILTER LOGIC
// ============================================================
function setDateDefaults() {
  if (!ALL_DATA.length) return;
  const dates = ALL_DATA.filter(d => d.date).map(d => d.date);
  if (!dates.length) return;
  const maxDate = new Date(Math.max(...dates));
  const minDate = new Date(Math.min(...dates));
  // Default: last 4 weeks from most recent
  const fourWeeksAgo = new Date(maxDate);
  fourWeeksAgo.setDate(fourWeeksAgo.getDate() - 28);
  const from = fourWeeksAgo > minDate ? fourWeeksAgo : minDate;

  document.getElementById('dateFrom').value = fmt(from);
  document.getElementById('dateTo').value = fmt(maxDate);
  document.getElementById('dateFrom').min = fmt(minDate);
  document.getElementById('dateTo').max = fmt(maxDate);
}

function fmt(d) { return d.toISOString().split('T')[0]; }

function onDateChange() { expandedClient = null; render(); }

function getFiltered() {
  const from = document.getElementById('dateFrom').value ? new Date(document.getElementById('dateFrom').value + 'T00:00:00') : null;
  const to = document.getElementById('dateTo').value ? new Date(document.getElementById('dateTo').value + 'T23:59:59') : null;
  const fi = document.getElementById('fI').value;
  const fp = document.getElementById('fP').value;
  const fc = document.getElementById('fC').value;
  const fprj = document.getElementById('fPrj').value;
  const fr = document.getElementById('fR').value;

  let d = [...ALL_DATA];
  if (from) d = d.filter(r => r.date && r.date >= from);
  if (to) d = d.filter(r => r.date && r.date <= to);
  const total = d.length;

  if (fi !== 'All') d = d.filter(r => r.industry === fi);
  if (fp !== 'All') d = d.filter(r => r.practiceArea === fp);
  if (fc !== 'All') d = d.filter(r => r.client === fc);
  if (fprj !== 'All') d = d.filter(r => r.project === fprj);
  if (fr !== 'All') d = d.filter(r => r.role === fr);

  const anyF = fi !== 'All' || fp !== 'All' || fc !== 'All' || fprj !== 'All' || fr !== 'All';
  document.getElementById('clearBtn').classList.toggle('hidden', !anyF);
  const info = document.getElementById('filterInfo');
  if (anyF) { info.classList.remove('hidden'); info.textContent = `Showing ${d.length} of ${total} in range`; }
  else { info.classList.add('hidden'); }
  return d;
}

function populateFilters() {
  const fields = [
    { id: 'fI', key: 'industry' }, { id: 'fP', key: 'practiceArea' },
    { id: 'fC', key: 'client' }, { id: 'fPrj', key: 'project' }, { id: 'fR', key: 'role' }
  ];
  fields.forEach(f => {
    const sel = document.getElementById(f.id);
    const vals = [...new Set(ALL_DATA.map(d => d[f.key]).filter(Boolean))].sort();
    sel.innerHTML = '<option>All</option>' + vals.map(v => `<option>${esc(v)}</option>`).join('');
  });

function clearFilters() {
  ['fI','fP','fC','fPrj','fR'].forEach(id => document.getElementById(id).value = 'All');

// ============================================================
// SPARKLINE RENDERING
// ============================================================
function sparklineSVG(points, color, height) {
  if (!points || points.length < 2) return '';
  const h = height || 28;
  const w = 120;
  const pad = 4;
  const min = Math.min(...points) * 0.9;
  const max = Math.max(...points) * 1.1 || 1;
  const range = max - min || 1;
  const coords = points.map((v, i) => {
    const x = pad + (i / (points.length - 1)) * (w - pad * 2);
    const y = h - pad - ((v - min) / range) * (h - pad * 2);
    return { x, y };
  });
  const linePath = coords.map((c, i) => `${i === 0 ? 'M' : 'L'}${c.x.toFixed(1)},${c.y.toFixed(1)}`).join(' ');
  const areaPath = linePath + ` L${coords[coords.length-1].x.toFixed(1)},${h} L${coords[0].x.toFixed(1)},${h} Z`;
  const lastPt = coords[coords.length - 1];
  return `<div class="sparkline-wrap"><svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <path d="${areaPath}" fill="${color}" class="spark-area"/>
    <path d="${linePath}" stroke="${color}" class="spark-line"/>
    <circle cx="${lastPt.x.toFixed(1)}" cy="${lastPt.y.toFixed(1)}" r="3" fill="${color}" class="spark-dot"/>
  </svg></div>`;
}

function getWeeklyTrend(data, field) {
  // Group by week
  const weeks = {};
  data.forEach(d => {
    if (!d.date || d.status !== 'Completed') return;
    const wk = getWeekKey(d.date);
    if (!weeks[wk]) weeks[wk] = [];
    const val = d[field];
    if (val !== null && val !== undefined) weeks[wk].push(val);
  });
  const sorted = Object.keys(weeks).sort();
  return sorted.map(wk => {
    const vals = weeks[wk];
    return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
  }).filter(v => v !== null);
}

function getWeekKey(date) {
  const d = new Date(date);
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
  const week1 = new Date(d.getFullYear(), 0, 4);
  const weekNum = 1 + Math.round(((d - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
  return `${d.getFullYear()}-W${String(weekNum).padStart(2, '0')}`;
}

function trendDelta(points) {
  if (!points || points.length < 2) return '';
  const prev = points[points.length - 2];
  const curr = points[points.length - 1];
  const delta = curr - prev;
  if (Math.abs(delta) < 0.05) return '<span class="kpi-desc" style="background:var(--border);color:var(--text2)">→ Flat</span>';
  const up = delta > 0;
  const color = up ? 'var(--green)' : 'var(--red)';
  const bg = up ? 'var(--green-bg)' : 'var(--red-bg)';
  return `<span class="kpi-desc" style="background:${bg};color:${color}">${up ? '↑' : '↓'} ${Math.abs(delta).toFixed(1)}</span>`;
}

function renderOverview() {
  const all = getFiltered();
  const comp = all.filter(d => d.status === 'Completed');

  // Split by version for proper averaging
  const v2 = comp.filter(d => d.version === 2);
  const v1 = comp.filter(d => d.version === 1);

  // KPI calculations — prefer v2 fields, fall back to v1
  const avgTone = v2.length ? (v2.reduce((s, d) => s + (d.clientTone || 0), 0) / v2.length) : null;
  const avgConf = v2.length ? (v2.reduce((s, d) => s + (d.engagementConfidence || 0), 0) / v2.length) : null;
  const avgBW = comp.length ? (comp.reduce((s, d) => s + (d.bandwidth || 0), 0) / comp.filter(d => d.bandwidth).length) : null;

  // Trend data

              <div><div class="proj-metric-label">Confidence</div><div class="proj-metric-val" style="color:${pc !== null ? scaleColor(pc, 5) : 'var(--text3)'}">${pc !== null ? pc.toFixed(1) + ' ' + scaleLabel(pc, CONF_LABELS) : '—'}</div></div>
              <div><div class="proj-metric-label">Bandwidth</div><div class="proj-metric-val" style="color:${pb !== null ? scaleColor(pb, 5) : 'var(--text3)'}">${pb !== null ? pb.toFixed(1) + ' ' + scaleLabel(pb, BW_LABELS) : '—'}</div></div>

function getWeeklyCount(data) {
  const weeks = {};
  data.forEach(d => {
    if (!d.date) return;
    const wk = getWeekKey(d.date);
    if (!weeks[wk]) weeks[wk] = 0;
    if (d.status === 'Completed') weeks[wk]++;
  });
  return Object.keys(weeks).sort().map(wk => weeks[wk]);
}

function toggleClient(client) {
  expandedClient = expandedClient === client ? null : client;
  render();
}

function renderAIResult(result) {
  let h = '';
  if (result.error) {
    return `<div class="card" style="border-color:var(--red)"><div style="color:var(--red);font-weight:600;margin-bottom:8px">Analysis Error</div><div style="color:var(--text2)">${esc(result.error)}</div></div>`;
  }

  // Executive Summary
  if (result.summary) {
    h += `<div class="card"><div class="ai-section-title">📋 Executive Summary</div><div class="ai-prose">${formatAIText(result.summary)}</div></div>`;
  }

  // Themes & Risks side by side
  h += '<div class="two-col">';
  if (result.themes) {
    h += `<div class="card"><div class="ai-section-title">🏷 Key Themes</div>${formatAIText(result.themes)}</div>`;
  }
  if (result.risks) {
    h += `<div class="card"><div class="ai-section-title">🚨 Risks & Mismatches</div>${formatAIText(result.risks)}</div>`;
  }
  h += '</div>';

  // Opportunities & Patterns
  h += '<div class="two-col">';
  if (result.opportunities) {
    h += `<div class="card"><div class="ai-section-title">💡 Opportunities</div>${formatAIText(result.opportunities)}</div>`;
  }
  if (result.patterns) {
    h += `<div class="card"><div class="ai-section-title">📈 Trends & Patterns</div>${formatAIText(result.patterns)}</div>`;
  }
  h += '</div>';

  // Metadata
  h += `<div style="text-align:right;font-size:11px;color:var(--text3);margin-top:8px">
    Analysis generated ${result.timestamp ? new Date(result.timestamp).toLocaleString() : 'just now'} • ${result.responseCount || '?'} responses analyzed
  </div>`;

  return h;
}

function formatAIText(text) {
  if (!text) return '';
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--text)">$1</strong>')
    .replace(/\n\n/g, '</p><p class="ai-prose">')
    .replace(/\n- /g, '<br>• ')
    .replace(/\n/g, '<br>');
}

async function runAIAnalysis() {
  if (isLoadingAI) return;
  if (!CLAUDE_API_KEY || CLAUDE_API_KEY === 'YOUR_API_KEY_HERE') {
    aiResult = { error: 'Claude API key not configured. Set CLAUDE_API_KEY at the top of the dashboard HTML file.' };
    render();
    return;
  }

  const lookback = document.getElementById('aiLookback')?.value || '4';
  const filtered = getAIData(lookback);
  if (!filtered.length) {
    aiResult = { error: 'No completed responses found for the selected period and filters.' };
    render();
    return;
  }

  // Cache key
  const cacheKey = JSON.stringify({
    lookback,
    fi: document.getElementById('fI').value,
    fp: document.getElementById('fP').value,
    fc: document.getElementById('fC').value,
    fprj: document.getElementById('fPrj').value,
    fr: document.getElementById('fR').value,
    count: filtered.length
  });

  if (aiCache[cacheKey]) {
    aiResult = aiCache[cacheKey];
    render();
    return;
  }

  isLoadingAI = true;
  render();

  try {
    const prompt = buildAIPrompt(filtered);
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": CLAUDE_API_KEY, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
      body: JSON.stringify({
        model: CLAUDE_MODEL,
        max_tokens: 2000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);

    const text = data.content?.[0]?.text || '';
    aiResult = parseAIResponse(text, filtered.length);
    aiCache[cacheKey] = aiResult;
  } catch (err) {
    aiResult = { error: `API call failed: ${err.message}` };
  }

  isLoadingAI = false;
  render();
}

function getAIData(lookback) {
  let data = getFiltered().filter(d => d.status === 'Completed');

  if (lookback !== 'range' && lookback !== '0') {
    const weeks = parseInt(lookback);
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - weeks * 7);
    data = data.filter(d => d.date && d.date >= cutoff);
  }

  return data;
}

function buildAIPrompt(data) {
  const weeks = [...new Set(data.map(d => d.date ? getWeekKey(d.date) : '?'))].sort();
  const clients = [...new Set(data.map(d => d.client))];

  const rows = data.map(d => {
    const parts = [`Consultant: ${d.consultant}`, `Client: ${d.client}`, `Project: ${d.project}`, `Industry: ${d.industry}`, `Practice: ${d.practiceArea}`, `Role: ${d.role}`, `Week: ${d.date ? getWeekKey(d.date) : '?'}`];
    if (d.version === 2) {
      parts.push(`ClientTone: ${d.clientTone} (${TONE_LABELS[d.clientTone] || '?'})`);
      parts.push(`EngagementConfidence: ${d.engagementConfidence} (${CONF_LABELS[d.engagementConfidence] || '?'})`);
      parts.push(`Bandwidth: ${d.bandwidth} (${BW_LABELS[d.bandwidth] || '?'})`);
      if (d.leadershipKnow) parts.push(`Leadership Should Know: ${d.leadershipKnow}`);
      if (d.whatWouldChange) parts.push(`Would Change: ${d.whatWouldChange}`);
      if (d.whatHeard) parts.push(`What Heard: ${d.whatHeard}`);
    } else {
      parts.push(`ProjectHealth: ${d.projectHealth}`, `ClientHealth: ${d.clientHealth}`);
      parts.push(`TeamSentiment: ${d.teamSentiment}/5`, `Bandwidth: ${d.bandwidth}/5`);
      if (d.highlight) parts.push(`Highlight: ${d.highlight}`);
      if (d.risk) parts.push(`Risk: ${d.risk}`);
      if (d.opportunity) parts.push(`Opportunity: ${d.opportunity}`);
    }
    return parts.join(' | ');
  });

  return `You are an operational intelligence analyst for Digineer, a consulting firm. Analyze the following weekly pulse check responses from consultants across ${clients.length} client engagements spanning ${weeks.length} week(s) (${weeks[0]} to ${weeks[weeks.length-1]}).

RESPONSES (${data.length} total):
${rows.join('\n')}

Provide analysis in exactly this format with these section headers. Use ** for bold. Be specific — name clients, consultants, projects. Flag contradictions between ratings and open-text.

## SUMMARY
2-3 paragraph executive summary of overall engagement health, notable shifts, and top priorities.

## THEMES
Key themes across all responses. Group by: client tone patterns, bandwidth concerns, recurring topics in open-ended answers.

## RISKS
Specific risks requiring attention. Include rating/text mismatches (e.g., positive tone rating but negative open-text). Flag persistent issues across weeks. Name the client, project, and consultant.

## OPPORTUNITIES
Expansion signals, upsell mentions, client asks. Include who mentioned them and at which client.

## PATTERNS
Trends over time if multi-week data available. Cross-client patterns. Industry-level observations. Bandwidth distribution concerns.`;
}

function parseAIResponse(text, count) {
  const sections = {};
  const parts = text.split(/##\s+/);
  parts.forEach(part => {
    const lines = part.trim().split('\n');
    const title = lines[0]?.toUpperCase()?.trim();
    const content = lines.slice(1).join('\n').trim();
    if (title === 'SUMMARY') sections.summary = content;
    else if (title === 'THEMES') sections.themes = content;
    else if (title === 'RISKS') sections.risks = content;
    else if (title === 'OPPORTUNITIES') sections.opportunities = content;
    else if (title === 'PATTERNS') sections.patterns = content;
  });

  // Fallback if parsing failed
  if (!sections.summary && text.length > 0) {
    sections.summary = text;
  }

  return { ...sections, timestamp: Date.now(), responseCount: count };
}

// ============================================================
// INDIVIDUAL RESPONSES
// ============================================================
function renderDetail() {
  const all = getFiltered();

  if (!all.length) {
    document.getElementById('detailTab').innerHTML = '<div class="empty">No responses match current filters and date range.</div>';
    return;
  }

  let h = '';
  all.forEach(d => {
    const isSk = d.status === 'Skipped';
    h += `<div class="detail-card"><div class="detail-top"><div>
      <div class="detail-name">${esc(d.consultant)}</div>
      <div class="detail-sub">${esc(d.client)} • ${esc(d.project || '—')} • ${esc(d.practiceArea)} • ${esc(d.role)} • ${d.date ? d.date.toLocaleDateString() : ''}</div>
    </div>
    <span class="status-badge" style="background:${isSk ? 'var(--yellow-bg)' : 'var(--green-bg)'};color:${isSk ? 'var(--yellow)' : 'var(--green)'}">${d.status}</span></div>`;

    if (isSk) {
      h += `<div class="text-field-val">Skipped — ${esc(d.skipReason || 'No reason given')}</div>`;
    } else if (d.version === 2) {
      h += `<div class="metrics-grid">
        <div class="metric"><div class="metric-lbl">Client Tone</div><div class="metric-val" style="color:${d.clientTone ? scaleColor(d.clientTone, 4) : 'var(--text3)'}">${d.clientTone || '—'} <span style="font-size:11px">${d.clientTone ? TONE_LABELS[d.clientTone] : ''}</span></div></div>
        <div class="metric"><div class="metric-lbl">Confidence</div><div class="metric-val" style="color:${d.engagementConfidence ? scaleColor(d.engagementConfidence, 5) : 'var(--text3)'}">${d.engagementConfidence || '—'} <span style="font-size:11px">${d.engagementConfidence ? CONF_LABELS[d.engagementConfidence] : ''}</span></div></div>
        <div class="metric"><div class="metric-lbl">Bandwidth</div><div class="metric-val" style="color:${d.bandwidth ? scaleColor(d.bandwidth, 5) : 'var(--text3)'}">${d.bandwidth || '—'} <span style="font-size:11px">${d.bandwidth ? BW_LABELS[d.bandwidth] : ''}</span></div></div>
        <div class="metric"><div class="metric-lbl">Version</div><div class="metric-val" style="color:var(--teal)">v${d.version}</div></div>
      </div>`;
      if (d.leadershipKnow) h += `<div class="text-field"><div class="text-field-lbl">💬 Leadership Should Know</div><div class="text-field-val">${esc(d.leadershipKnow)}</div></div>`;
      if (d.whatWouldChange) h += `<div class="text-field"><div class="text-field-lbl">🔄 Would Change</div><div class="text-field-val">${esc(d.whatWouldChange)}</div></div>`;
      if (d.whatHeard) h += `<div class="text-field"><div class="text-field-lbl">👂 What Heard</div><div class="text-field-val">${esc(d.whatHeard)}</div></div>`;
    } else {
      // V1 display
      h += `<div class="metrics-grid">
        <div class="metric"><div class="metric-lbl">Project Health</div><div class="metric-val" style="color:${healthColor(d.projectHealth)}">${d.projectHealth || '—'}</div></div>
        <div class="metric"><div class="metric-lbl">Client Health</div><div class="metric-val" style="color:${healthColor(d.clientHealth)}">${d.clientHealth || '—'}</div></div>
        <div class="metric"><div class="metric-lbl">Team Sentiment</div><div class="metric-val" style="color:${d.teamSentiment ? scaleColor(d.teamSentiment, 5) : 'var(--text3)'}">${d.teamSentiment || '—'}/5</div></div>
        <div class="metric"><div class="metric-lbl">Bandwidth</div><div class="metric-val" style="color:${d.bandwidth ? scaleColor(d.bandwidth, 5) : 'var(--text3)'}">${d.bandwidth || '—'}/5</div></div>
      </div>`;
      if (d.highlight) h += `<div class="text-field"><div class="text-field-lbl">💡 Highlight</div><div class="text-field-val">${esc(d.highlight)}</div></div>`;
      if (d.risk) h += `<div class="text-field"><div class="text-field-lbl">⚠️ Risk</div><div class="text-field-val">${esc(d.risk)}</div></div>`;
      if (d.opportunity) h += `<div class="text-field"><div class="text-field-lbl">🎯 Opportunity</div><div class="text-field-val">${esc(d.opportunity)}</div></div>`;
    }
    h += '</div>';
  });

  document.getElementById('detailTab').innerHTML = h;
}

function healthColor(v) {
  if (v === 'Green') return 'var(--green)';
  if (v === 'Yellow') return 'var(--yellow)';
  if (v === 'Red') return 'var(--red)';
  return 'var(--text3)';
}

// ============================================================
// RENDER DISPATCHER
// ============================================================
function render() {
  if (!dataLoaded) return;
  if (currentTab === 'overview') renderOverview();
  else if (currentTab === 'ai') renderAI();
  else if (currentTab === 'detail') renderDetail();
}

function toggleRisk(i) { expandedRisk = expandedRisk === i ? null : i; render(); }

// ============================================================
// INIT
// ============================================================
loadData();
</script>
