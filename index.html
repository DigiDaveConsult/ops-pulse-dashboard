<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ops Pulse Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0f16; --surface: #151923; --surface2: #1c2130; --border: #252b3b;
  --text: #e2e8f0; --text2: #94a3b8; --text3: #4a5568; --mono: 'JetBrains Mono', monospace;
  --teal: #0ea5a0; --teal-bg: #0ea5a015; --purple: #a78bfa; --purple-bg: #a78bfa12;
  --green: #10b981; --yellow: #f59e0b; --orange: #f97316; --red: #ef4444; --blue: #3b82f6;
  --green-bg: #10b98115; --yellow-bg: #f59e0b15; --red-bg: #ef444415;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',system-ui,sans-serif; min-height:100vh; }
select,button,input { font-family:'DM Sans',sans-serif; }

/* HEADER */
.header { background:linear-gradient(135deg, var(--surface) 0%, var(--bg) 100%); border-bottom:1px solid var(--border); padding:20px 32px; }
.header-inner { max-width:1400px; margin:0 auto; }
.header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:12px; }
.header-badge { display:flex; align-items:center; gap:10px; margin-bottom:4px; }
.header-dot { width:8px; height:8px; border-radius:50%; box-shadow:0 0 8px #10b98166; }
.header-label { font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--text3); }
.header h1 { font-size:22px; font-weight:700; color:var(--text); }
.header-right { display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
.date-range { display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:6px 12px; }
.date-range label { font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text3); }
/* date input styles moved to enhanced version below */
.date-range span { color:var(--text3); font-size:12px; }
.filters { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; }
.filter-group { display:flex; flex-direction:column; gap:4px; }
.filter-label { font-size:10px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; color:var(--text3); }
.filter-select { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:6px 10px; color:var(--text); font-size:13px; cursor:pointer; outline:none; min-width:140px; }
.filter-select:focus { border-color:var(--teal); }
.clear-btn { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:6px 14px; color:var(--text2); font-size:12px; font-weight:600; cursor:pointer; height:33px; }
.clear-btn:hover { background:var(--border); }
.filter-info { font-size:12px; color:var(--yellow); font-weight:500; padding-bottom:6px; }
.data-status { font-size:11px; color:var(--text3); display:flex; align-items:center; gap:6px; }
.data-status .dot { width:6px; height:6px; border-radius:50%; }

/* TABS */
.tabs-wrap { max-width:1400px; margin:0 auto; padding:20px 32px 0; }
.tabs { display:flex; gap:4px; border-bottom:1px solid var(--border); }
.tab { padding:10px 20px; font-size:14px; font-weight:600; background:transparent; color:var(--text3); border:1px solid transparent; border-bottom:none; border-radius:8px 8px 0 0; cursor:pointer; margin-bottom:-1px; transition:all 0.2s; }
.tab:hover { color:var(--text2); }
.tab.active { background:var(--surface); color:var(--text); border-color:var(--border); border-bottom-color:var(--bg); }
.content { max-width:1400px; margin:0 auto; padding:0 32px 40px; }
.hidden { display:none !important; }

/* KPI */
.kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
.kpi-card { background:var(--surface); border-radius:12px; padding:20px; border:1px solid var(--border); position:relative; overflow:hidden; }
.kpi-bar { position:absolute; top:0; left:0; right:0; height:3px; }
.kpi-label { font-size:10px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--text3); margin-bottom:8px; display:flex; align-items:center; gap:8px; }
.kpi-value { font-size:28px; font-weight:700; color:var(--text); font-family:var(--mono); margin-bottom:4px; display:flex; align-items:baseline; gap:8px; }
.kpi-desc { font-size:11px; font-weight:600; padding:2px 8px; border-radius:10px; }
.kpi-sub { font-size:12px; color:var(--text3); margin-bottom:8px; }
.sparkline-wrap { height:32px; margin-top:8px; }
.sparkline-wrap svg { width:100%; height:32px; }
.spark-line { fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.spark-area { opacity:0.15; }

/* TABLE */
.card { background:var(--surface); border-radius:12px; border:1px solid var(--border); padding:24px; margin-bottom:20px; }
.card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.card h3 { font-size:16px; font-weight:600; color:var(--text); margin:0; }
.card-sub { font-size:12px; color:var(--text3); }
table { width:100%; border-collapse:collapse; }
th { padding:10px 14px; text-align:left; font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text3); border-bottom:1px solid var(--border); }
.crow { border-bottom:1px solid #1e2235; cursor:pointer; transition:background 0.15s; }
.crow:hover { background:var(--surface2); }
.crow.exp { background:var(--surface2); border-bottom:none; }
td { padding:12px 14px; font-size:13px; color:var(--text2); }

/* EXPAND / PROJECT */
.expand-inner { padding:12px 16px 16px; background:var(--bg); border-radius:8px; border:1px solid #1e2235; margin:4px 14px 12px; }
.expand-lbl { font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text3); margin-bottom:12px; }
.proj-card { padding:12px 16px; background:var(--surface); border-radius:8px; border:1px solid var(--border); margin-bottom:8px; }
.proj-card:last-child { margin-bottom:0; }
.proj-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; flex-wrap:wrap; gap:8px; }
.proj-name { font-size:14px; font-weight:600; color:var(--text); }
.proj-badges { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.proj-metrics { display:grid; grid-template-columns:repeat(3,auto); gap:16px; font-size:12px; }
.proj-metric-label { color:var(--text3); font-size:10px; text-transform:uppercase; letter-spacing:0.5px; }
.proj-metric-val { font-family:var(--mono); font-size:14px; font-weight:600; }
.mini-pill { font-size:10px; font-weight:600; padding:2px 8px; border-radius:10px; }

/* SKIP */
.skip-summary { background:var(--surface); border-radius:12px; border:1px solid var(--border); padding:20px; margin-bottom:20px; }
.skip-row { display:flex; gap:16px; padding:6px 0; border-bottom:1px solid #1e2235; font-size:13px; }
.skip-row:last-child { border-bottom:none; }

/* AI */
.ai-banner { display:flex; align-items:center; gap:12px; margin-bottom:20px; padding:14px 18px; background:linear-gradient(135deg, var(--surface), #1e1535); border-radius:10px; border:1px solid #2d2148; flex-wrap:wrap; }
.ai-section-title { font-size:13px; font-weight:600; color:var(--purple); margin-bottom:8px; display:flex; align-items:center; gap:6px; }
.ai-prose { font-size:14px; line-height:1.7; color:var(--text2); }
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }

/* DETAIL */
.detail-card { background:var(--surface); border-radius:12px; border:1px solid var(--border); padding:20px; margin-bottom:14px; }
.detail-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px; }
.detail-name { font-size:15px; font-weight:600; color:var(--text); }
.detail-sub { font-size:12px; color:var(--text3); margin-top:2px; }
.status-badge { font-size:12px; font-weight:600; padding:4px 12px; border-radius:16px; }
.metrics-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:14px; }
.metric { padding:10px 14px; border-radius:8px; background:var(--bg); border:1px solid #1e2235; }
.metric-lbl { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text3); margin-bottom:4px; }
.metric-val { font-size:16px; font-weight:700; font-family:var(--mono); }
.text-field { margin-bottom:10px; }
.text-field:last-child { margin-bottom:0; }
.text-field-lbl { font-size:12px; font-weight:600; color:var(--text3); margin-bottom:4px; }
.text-field-val { font-size:13px; color:var(--text2); line-height:1.6; padding:10px 14px; background:var(--bg); border-radius:8px; border:1px solid #1e2235; }

/* MISC */
.empty { padding:60px; text-align:center; color:var(--text3); background:var(--surface); border-radius:12px; border:1px solid var(--border); font-size:14px; }
.page-loading { display:flex; flex-direction:column; align-items:center; justify-content:center; height:60vh; gap:16px; }
.page-loading .spinner { width:32px; height:32px; border:3px solid var(--teal); border-top-color:transparent; border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.upload-zone { border:2px dashed var(--border); border-radius:12px; padding:40px; text-align:center; cursor:pointer; transition:border-color 0.2s; margin-bottom:20px; }
.upload-zone:hover { border-color:var(--teal); }
.upload-zone.dragover { border-color:var(--teal); background:var(--teal-bg); }


/* CALENDAR PICKER - MORE VISIBLE */
.date-range input[type="date"] { background:var(--surface2); border:2px solid var(--teal); border-radius:6px; padding:6px 10px; color:var(--text); font-family:var(--mono); font-size:13px; outline:none; cursor:pointer; }
.date-range input[type="date"]:hover { border-color:#0fd4cd; background:var(--surface); }
.date-range input[type="date"]:focus { border-color:#0fd4cd; box-shadow:0 0 0 2px rgba(14,165,160,0.25); }
.date-range input[type="date"]::-webkit-calendar-picker-indicator { filter:invert(0.7) sepia(1) saturate(3) hue-rotate(140deg); cursor:pointer; font-size:16px; }

/* AI SUB-TABS */
.ai-subtabs { display:flex; gap:4px; margin-bottom:16px; }
.ai-subtab { padding:6px 14px; font-size:12px; font-weight:600; background:var(--surface2); color:var(--text3); border:1px solid var(--border); border-radius:6px; cursor:pointer; transition:all 0.2s; }
.ai-subtab:hover { color:var(--text2); }
.ai-subtab.active { background:var(--purple-bg); color:var(--purple); border-color:var(--purple); }

/* AI TIMEFRAME TOGGLE */
.ai-timeframe { display:flex; gap:4px; margin-bottom:16px; }
.ai-tf-btn { padding:5px 12px; font-size:11px; font-weight:600; background:var(--surface2); color:var(--text3); border:1px solid var(--border); border-radius:6px; cursor:pointer; }
.ai-tf-btn.active { background:var(--teal-bg); color:var(--teal); border-color:var(--teal); }

/* MEETING TOPICS */
.meeting-client-select { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:6px 10px; color:var(--text); font-size:13px; min-width:200px; }
.topic-group { margin-bottom:6px; }
.topic-label { font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; padding:4px 10px; border-radius:4px; margin-bottom:8px; display:inline-block; }
.topic-new { background:var(--teal-bg); color:var(--teal); }
.topic-older { background:var(--border); color:var(--text3); }
.topic-item { padding:10px 16px; background:var(--bg); border:1px solid #1e2235; border-radius:8px; margin-bottom:6px; font-size:13px; color:var(--text2); cursor:default; }
.topic-item .topic-project { font-size:11px; color:var(--teal); font-weight:600; margin-bottom:2px; }

/* USAGE TRENDS */
.chart-container { background:var(--bg); border:1px solid #1e2235; border-radius:8px; padding:16px; margin-bottom:16px; }
.chart-container svg { width:100%; }
.usage-table { width:100%; }
.usage-table th { text-align:left; }
.rate-bar { height:6px; border-radius:3px; background:var(--border); display:inline-block; vertical-align:middle; margin-left:8px; }
.rate-fill { height:100%; border-radius:3px; }

@media (max-width:900px) {
  .kpi-grid { grid-template-columns:repeat(2,1fr); }
  .two-col { grid-template-columns:1fr; }
  .metrics-grid { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div>
        <div class="header-badge">
          <div class="header-dot" id="statusDot" style="background:var(--text3)"></div>
          <span class="header-label">Ops Pulse</span>
        </div>
        <h1>Pulse Check Dashboard</h1>
      </div>
      <div class="header-right">
        <div class="date-range">
          <label>From</label>
          <input type="date" id="dateFrom" onchange="render()">
          <span>→</span>
          <label>To</label>
          <input type="date" id="dateTo" onchange="render()">
        </div>
        <button class="refresh-btn" id="refreshBtn" onclick="refreshData()" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 14px;color:var(--teal);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px">
          <span id="refreshIcon">🔄</span> Refresh Data
        </button>
        <div class="data-status" id="dataStatus">
          <div class="dot" style="background:var(--text3)"></div>
          <span>Loading...</span>
        </div>
      </div>
    </div>
    <div class="filters">
      <div class="filter-group"><label class="filter-label">Industry</label><select id="fI" class="filter-select" onchange="render()"></select></div>
      <div class="filter-group"><label class="filter-label">Practice Area</label><select id="fP" class="filter-select" onchange="render()"></select></div>
      <div class="filter-group"><label class="filter-label">Client</label><select id="fC" class="filter-select" onchange="render()"></select></div>
      <div class="filter-group"><label class="filter-label">Project</label><select id="fPrj" class="filter-select" onchange="render()"></select></div>
      <div class="filter-group"><label class="filter-label">Role</label><select id="fR" class="filter-select" onchange="render()"></select></div>
      <button id="clearBtn" class="clear-btn hidden" onclick="clearFilters()">✕ Clear</button>
      <span id="filterInfo" class="filter-info hidden"></span>
    </div>
  </div>
</div>

<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" data-tab="overview" onclick="switchTab('overview')">Overview</button>
    <button class="tab" data-tab="ai" onclick="switchTab('ai')">🤖 AI Insights</button>
    <button class="tab" data-tab="meeting" onclick="switchTab('meeting')">📋 Account Meeting Topics</button>
    <button class="tab" data-tab="detail" onclick="switchTab('detail')">Individual Responses</button>
    <button class="tab" data-tab="usage" onclick="switchTab('usage')">📊 Usage Trends</button>
  </div>
</div>

<div class="content">
  <div id="loadingState" class="page-loading">
    <div class="spinner"></div>
    <div style="color:var(--text2);font-size:14px">Loading pulse data from Google Sheets...</div>
  </div>

  <div id="overviewTab" class="hidden"></div>
  <div id="aiTab" class="hidden"></div>
  <div id="meetingTab" class="hidden"></div>
  <div id="detailTab" class="hidden"></div>
  <div id="usageTab" class="hidden"></div>
</div>


<script>
// ============================================================
// CONFIGURATION
// ============================================================
const SHEET_ID = "1ycq6Oi9U5ThnisDc0Ij8QYwKmqQiD57O9lTRrb4wskc";
const SUBMISSIONS_GID = "0";
const AI_TAB_GID = "559870291";
const MEETING_GID = "MEETING_TAB_GID_HERE"; // Set after first Apps Script run creates the tab
function sheetCsvUrl(gid) { return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`; }

// STATE
let ALL_DATA = [], AI_ANALYSIS = null, MEETING_TOPICS = null, currentTab = 'overview', expandedClient = null, dataLoaded = false;
let aiView = 'all'; // 'all' or a client name
let aiTimeframe = 'recent'; // 'recent' or 'longer'

const TONE = {1:'Challenging',2:'Stable',3:'Positive',4:'Collaborative'};
const CONF = {1:'At Risk',2:'Concerning',3:'Stable But Watchful',4:'On Track',5:'Strong'};
const BW = {1:'Buried',2:'Heavy',3:'Busy',4:'Good',5:'Open'};

function scaleColor(v,m){if(m===4){if(v<=1.5)return'var(--red)';if(v<=2.5)return'var(--yellow)';if(v<=3.2)return'var(--green)';return'#059669'}if(v<=1.5)return'var(--red)';if(v<=2.5)return'var(--orange)';if(v<=3.5)return'var(--yellow)';if(v<=4.2)return'var(--green)';return'#059669'}
function lbl(v,m){return m[Math.round(v)]||'—'}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function num(v){if(v===null||v===undefined||v==='')return null;const n=Number(v);return isNaN(n)?null:n}

// CSV PARSER
function parseCsv(text){const lines=[];let cur='',inQ=false,row=[];for(let i=0;i<text.length;i++){const ch=text[i],nx=text[i+1];if(inQ){if(ch==='"'&&nx==='"'){cur+='"';i++}else if(ch==='"')inQ=false;else cur+=ch}else{if(ch==='"')inQ=true;else if(ch===','){row.push(cur.trim());cur=''}else if(ch==='\n'||(ch==='\r'&&nx==='\n')){row.push(cur.trim());cur='';if(row.some(c=>c!==''))lines.push(row);row=[];if(ch==='\r')i++}else cur+=ch}}row.push(cur.trim());if(row.some(c=>c!==''))lines.push(row);return lines}
function csvToObj(text){const lines=parseCsv(text);if(lines.length<2)return[];const hdr=lines[0];return lines.slice(1).map(row=>{const o={};hdr.forEach((h,i)=>{o[h]=row[i]||''});return o})}

// DATA LOADING
async function loadData(){
  try{
    updateStatus('loading','Fetching data...');
    const r=await fetch(sheetCsvUrl(SUBMISSIONS_GID));if(!r.ok)throw new Error(`Sheet error: ${r.status}`);
    const rows=csvToObj(await r.text());
    ALL_DATA=rows.map(s=>({
      consultant:s.ConsultantName||'',client:s.Client||'',industry:s.Industry||'',practiceArea:s.PracticeArea||'',
      role:s.Role||'',project:s.ProjectDescription||'',status:s.ResponseStatus||'Completed',
      date:s.SubmissionDate?new Date(s.SubmissionDate):null,clientTone:num(s.ClientTone),
      engagementConfidence:num(s.EngagementConfidence),bandwidth:num(s.Bandwidth),
      leadershipKnow:s.LeadershipKnow||'',whatWouldChange:s.WhatWouldChange||'',whatHeard:s.WhatHeard||'',
      skipReason:s.SkipReason||'',manager:s.ManagerEmail||s.Manager||''
    })).filter(d=>d.consultant||d.client).sort((a,b)=>(b.date||0)-(a.date||0));

    AI_ANALYSIS=null;
    try{const ar=await fetch(sheetCsvUrl(AI_TAB_GID));if(ar.ok){const aiRows=csvToObj(await ar.text());if(aiRows.length>0){
      // Support multi-row: rows may have Client column for per-client analysis
      AI_ANALYSIS = aiRows.map(r=>({
        client:r.Client||'All',timeframe:r.Timeframe||'all',
        summary:r.Summary||'',themes:r.Themes||'',risks:r.Risks||'',
        opportunities:r.Opportunities||'',patterns:r.Patterns||'',generatedAt:r.GeneratedAt||''
      }));
    }}}catch(e){console.warn('AI tab:',e.message)}

    // Load meeting topics from Claude-generated tab
    MEETING_TOPICS=null;
    try{
      if(MEETING_GID&&MEETING_GID!=='MEETING_TAB_GID_HERE'){
        const mr=await fetch(sheetCsvUrl(MEETING_GID));
        if(mr.ok){const mtRows=csvToObj(await mr.text());if(mtRows.length>0)MEETING_TOPICS=mtRows}
      }
    }catch(e){console.warn('Meeting tab:',e.message)}

    dataLoaded=true;document.getElementById('loadingState').classList.add('hidden');
    document.getElementById('overviewTab').classList.remove('hidden');
    updateStatus('ok',`${ALL_DATA.length} records loaded`);setDateDefaults();populateFilters();render();
  }catch(err){
    console.error(err);
    document.getElementById('loadingState').innerHTML=`<div style="text-align:center;color:var(--red)"><div style="font-size:18px;margin-bottom:8px">⚠ Data Load Error</div><div style="color:var(--text2);margin-bottom:12px">${esc(err.message)}</div><button onclick="loadData()" style="padding:8px 20px;background:var(--teal);color:white;border:none;border-radius:6px;cursor:pointer;font-weight:600">Retry</button></div>`;
    updateStatus('error','Load failed');
  }
}
function updateStatus(s,msg){const c={ok:'var(--green)',loading:'var(--yellow)',error:'var(--red)'};document.getElementById('statusDot').style.background=c[s]||'var(--text3)';document.getElementById('dataStatus').innerHTML=`<div class="dot" style="background:${c[s]||'var(--text3)'}"></div><span>${msg}</span>`}
async function refreshData(){const btn=document.getElementById('refreshBtn'),icon=document.getElementById('refreshIcon');btn.disabled=true;icon.textContent='⟳';icon.style.display='inline-block';icon.style.animation='spin 0.8s linear infinite';await loadData();btn.disabled=false;icon.textContent='🔄';icon.style.animation=''}

// ============================================================
// DATE & FILTERS
// ============================================================
function setDateDefaults(){const dates=ALL_DATA.filter(d=>d.date).map(d=>d.date);if(!dates.length)return;const maxD=new Date(Math.max(...dates)),minD=new Date(Math.min(...dates));const fw=new Date(maxD);fw.setDate(fw.getDate()-28);const from=fw>minD?fw:minD;document.getElementById('dateFrom').value=fmt(from);document.getElementById('dateTo').value=fmt(maxD)}
function fmt(d){return d.toISOString().split('T')[0]}

function getFiltered(){
  const from=document.getElementById('dateFrom').value?new Date(document.getElementById('dateFrom').value+'T00:00:00'):null;
  const to=document.getElementById('dateTo').value?new Date(document.getElementById('dateTo').value+'T23:59:59'):null;

// ============================================================
function spark(pts,color){if(!pts||pts.length<2)return'';const h=28,w=120,pad=4;const mn=Math.min(...pts)*0.9,mx=Math.max(...pts)*1.1||1,rng=mx-mn||1;const coords=pts.map((v,i)=>({x:pad+(i/(pts.length-1))*(w-pad*2),y:h-pad-((v-mn)/rng)*(h-pad*2)}));const line=coords.map((c,i)=>`${i===0?'M':'L'}${c.x.toFixed(1)},${c.y.toFixed(1)}`).join(' ');const area=line+` L${coords[coords.length-1].x.toFixed(1)},${h} L${coords[0].x.toFixed(1)},${h} Z`;const last=coords[coords.length-1];return`<div class="sparkline-wrap"><svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><path d="${area}" fill="${color}" class="spark-area"/><path d="${line}" stroke="${color}" class="spark-line"/><circle cx="${last.x.toFixed(1)}" cy="${last.y.toFixed(1)}" r="3" fill="${color}"/></svg></div>`}

function lineChart(points, labels, color, height){
  if(!points||points.length<2)return'<div style="color:var(--text3);font-size:12px;padding:20px;text-align:center">Not enough data for chart</div>';
  const h=height||120,w=500,pad=30,padR=10,padB=20;
  const mn=Math.min(...points)*0.9,mx=Math.max(...points)*1.1||1,rng=mx-mn||1;
  const coords=points.map((v,i)=>({x:pad+(i/(points.length-1))*(w-pad-padR),y:h-padB-((v-mn)/rng)*(h-padB-10)}));
  const line=coords.map((c,i)=>`${i===0?'M':'L'}${c.x.toFixed(1)},${c.y.toFixed(1)}`).join(' ');
  const area=line+` L${coords[coords.length-1].x.toFixed(1)},${h-padB} L${coords[0].x.toFixed(1)},${h-padB} Z`;
  let svg=`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:${h}px">`;
  // Grid lines
  for(let i=0;i<4;i++){const y=10+(i/3)*(h-padB-10);svg+=`<line x1="${pad}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="var(--border)" stroke-width="0.5"/>`}
  svg+=`<path d="${area}" fill="${color}" opacity="0.1"/>`;
  svg+=`<path d="${line}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
  coords.forEach((c,i)=>{svg+=`<circle cx="${c.x.toFixed(1)}" cy="${c.y.toFixed(1)}" r="3" fill="${color}"/>`;
    if(labels&&labels[i]){svg+=`<text x="${c.x.toFixed(1)}" y="${h-4}" text-anchor="middle" fill="var(--text3)" font-size="9" font-family="var(--mono)">${labels[i]}</text>`}
  });
  // Y-axis labels
  svg+=`<text x="${pad-4}" y="14" text-anchor="end" fill="var(--text3)" font-size="9" font-family="var(--mono)">${mx.toFixed(mx>=10?0:1)}</text>`;
  svg+=`<text x="${pad-4}" y="${h-padB}" text-anchor="end" fill="var(--text3)" font-size="9" font-family="var(--mono)">${mn.toFixed(mn>=10?0:1)}</text>`;
  svg+='</svg>';
  return svg;
}

function weeklyAvg(data,field){const weeks={};data.forEach(d=>{if(!d.date||d.status!=='Completed')return;const wk=weekKey(d.date);if(!weeks[wk])weeks[wk]=[];const val=d[field];if(val!==null&&val!==undefined)weeks[wk].push(val)});return Object.keys(weeks).sort().map(wk=>weeks[wk].length?weeks[wk].reduce((a,b)=>a+b,0)/weeks[wk].length:null).filter(v=>v!==null)}
function weeklyCounts(data){const weeks={};data.forEach(d=>{if(!d.date)return;const wk=weekKey(d.date);weeks[wk]=(weeks[wk]||0)+(d.status==='Completed'?1:0)});return Object.keys(weeks).sort().map(wk=>weeks[wk])}
function weeklyLabels(data){const weeks={};data.forEach(d=>{if(!d.date)return;weeks[weekKey(d.date)]=1});return Object.keys(weeks).sort()}
function weekKey(date){const d=new Date(date);d.setHours(0,0,0,0);d.setDate(d.getDate()+3-(d.getDay()+6)%7);const w1=new Date(d.getFullYear(),0,4);const wn=1+Math.round(((d-w1)/86400000-3+(w1.getDay()+6)%7)/7);return`W${String(wn).padStart(2,'0')}`}
function delta(pts){if(!pts||pts.length<2)return'';const d=pts[pts.length-1]-pts[pts.length-2];if(Math.abs(d)<0.05)return'<span class="kpi-desc" style="background:var(--border);color:var(--text2)">→ Flat</span>';const up=d>0;return`<span class="kpi-desc" style="background:${up?'var(--green-bg)':'var(--red-bg)'};color:${up?'var(--green)':'var(--red)'}">${up?'↑':'↓'} ${Math.abs(d).toFixed(1)}</span>`}

function avg(rows,field){const vals=rows.map(d=>d[field]).filter(v=>v!==null&&v!==undefined);return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null}
function kpiCard(label,val,max,map,trend,color){if(val===null)return`<div class="kpi-card"><div class="kpi-bar" style="background:var(--text3)"></div><div class="kpi-label">${label}</div><div class="kpi-value">—</div><div class="kpi-sub">No data</div></div>`;const c=scaleColor(val,max);return`<div class="kpi-card"><div class="kpi-bar" style="background:${c}"></div><div class="kpi-label">${label} ${delta(trend)}</div><div class="kpi-value"><span style="color:${c}">${val.toFixed(1)}</span></div><div class="kpi-sub" style="color:${c};font-weight:600">${lbl(val,map)}</div>${spark(trend,color||c)}</div>`}
function scaleCell(val,max,map){if(val===null)return'<td><span style="color:var(--text3)">—</span></td>';return`<td><span style="color:${scaleColor(val,max)};font-weight:600;font-family:var(--mono)">${val.toFixed(1)}</span> <span style="font-size:11px;color:var(--text3)">${lbl(val,map)}</span></td>`}

    }
  }

  }

  // Filter topics to selected clients

  Object.entries(byClient).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([client,topics])=>{
    h+=`<div class="card"><h3 style="margin-bottom:16px">${esc(client)}</h3>`;

    if(newTopics.length){

        h+=`<div class="topic-item"><div class="topic-project">${esc(proj)}</div>• ${esc(heading)}</div>`;

}

// Fallback if Claude topics not yet generated — simple version from raw data
function renderMeetingFallback(selectedClients){
  const now=new Date();const fiveWeeksAgo=new Date(now);fiveWeeksAgo.setDate(fiveWeeksAgo.getDate()-35);
  const twoHalfWeeksAgo=new Date(now);twoHalfWeeksAgo.setDate(twoHalfWeeksAgo.getDate()-18);
  const recent=ALL_DATA.filter(d=>d.status==='Completed'&&d.date&&d.date>=fiveWeeksAgo&&selectedClients.includes(d.client));
  if(!recent.length)return'<div class="empty">No submissions in the last 5 weeks. Run AI Analysis from Google Sheet to generate Claude-powered topics.</div>';

  let h='<div style="padding:12px 16px;background:var(--surface2);border-radius:8px;margin-bottom:16px;font-size:12px;color:var(--text3)">💡 These are raw submission summaries. Run the Apps Script AI Analysis to generate curated discussion topics powered by Claude.</div>';
  const byClient={};recent.forEach(d=>{if(!byClient[d.client])byClient[d.client]=[];byClient[d.client].push(d)});
  Object.entries(byClient).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([client,items])=>{
    const topics=items.filter(d=>(d.leadershipKnow&&d.leadershipKnow.length>10)||(d.whatWouldChange&&d.whatWouldChange.length>10)||(d.whatHeard&&d.whatHeard.length>10)||(d.clientTone&&d.clientTone<=2)||(d.engagementConfidence&&d.engagementConfidence<=2));
    if(!topics.length)return;
    h+=`<div class="card"><h3 style="margin-bottom:12px">${esc(client)}</h3>`;
    const newT=topics.filter(d=>d.date>=twoHalfWeeksAgo),oldT=topics.filter(d=>d.date<twoHalfWeeksAgo);
    if(newT.length){h+='<span class="topic-label topic-new">New</span>';newT.forEach(d=>{const txt=d.leadershipKnow||d.whatWouldChange||d.whatHeard||'';h+=`<div class="topic-item"><div class="topic-project">${esc(d.project||client)}</div>• ${esc(txt.substring(0,120))}${txt.length>120?'...':''}</div>`})}
    if(oldT.length){h+='<span class="topic-label topic-older" style="margin-top:8px">Earlier</span>';oldT.forEach(d=>{const txt=d.leadershipKnow||d.whatWouldChange||d.whatHeard||'';h+=`<div class="topic-item"><div class="topic-project">${esc(d.project||client)}</div>• ${esc(txt.substring(0,120))}${txt.length>120?'...':''}</div>`})}
    h+='</div>';
  });
  return h;
}

    if(isSk){h+=`<div class="text-field-val">Skipped — ${esc(d.skipReason||'No reason given')}</div>`}
    else{
      h+=`<div class="metrics-grid"><div class="metric"><div class="metric-lbl">Client Tone</div><div class="metric-val" style="color:${d.clientTone?scaleColor(d.clientTone,4):'var(--text3)'}">${d.clientTone||'—'} <span style="font-size:11px">${d.clientTone?TONE[d.clientTone]:''}</span></div></div><div class="metric"><div class="metric-lbl">Confidence</div><div class="metric-val" style="color:${d.engagementConfidence?scaleColor(d.engagementConfidence,5):'var(--text3)'}">${d.engagementConfidence||'—'} <span style="font-size:11px">${d.engagementConfidence?CONF[d.engagementConfidence]:''}</span></div></div><div class="metric"><div class="metric-lbl">Bandwidth</div><div class="metric-val" style="color:${d.bandwidth?scaleColor(d.bandwidth,5):'var(--text3)'}">${d.bandwidth||'—'} <span style="font-size:11px">${d.bandwidth?BW[d.bandwidth]:''}</span></div></div></div>`;
      if(d.leadershipKnow)h+=`<div class="text-field"><div class="text-field-lbl">💬 Leadership Should Know</div><div class="text-field-val">${esc(d.leadershipKnow)}</div></div>`;
      if(d.whatWouldChange)h+=`<div class="text-field"><div class="text-field-lbl">🔄 Would Change</div><div class="text-field-val">${esc(d.whatWouldChange)}</div></div>`;
      if(d.whatHeard)h+=`<div class="text-field"><div class="text-field-lbl">👂 What Heard</div><div class="text-field-val">${esc(d.whatHeard)}</div></div>`;
    }
    h+='</div>';
  });
  document.getElementById('detailTab').innerHTML=h;
}

// ============================================================
// USAGE TRENDS
// ============================================================
function renderUsage(){
  const all=ALL_DATA; // Use all data regardless of filters for usage stats
  const managers=[...new Set(all.map(d=>d.manager).filter(Boolean))].sort();
  const consultants=[...new Set(all.map(d=>d.consultant))].sort();

  let h='<div style="margin-bottom:16px;display:flex;align-items:center;gap:12px">';
  h+='<label style="font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text3)">Manager:</label>';
  h+='<select id="usageManagerSelect" class="filter-select" onchange="render()" style="min-width:200px"><option>All</option>';
  managers.forEach(m=>{h+=`<option>${esc(m)}</option>`});
  h+='</select></div>';

  const selMgr=document.getElementById('usageManagerSelect')?.value||'All';
  let filtered=selMgr==='All'?all:all.filter(d=>d.manager===selMgr);

  // Weekly volume
  const weekLabels=weeklyLabels(filtered);
  const weekCounts=weeklyCounts(filtered);

  h+='<div class="two-col">';
  h+=`<div class="card"><h3 style="margin-bottom:12px">Response Volume by Week</h3><div class="chart-container">${lineChart(weekCounts,weekLabels,'#3b82f6',140)}</div></div>`;

  // Completion rate: responses / total triggered (all data entries including no-response)
  // Since we only have submissions that were either Completed or Skipped, and "no response" = not in data,
  // we need consultant count per week. We'll use total unique consultants as denominator per week.
  const weekCompRate=[];
  const wks=weeklyLabels(filtered);
  wks.forEach(wk=>{
    const wkData=filtered.filter(d=>d.date&&weekKey(d.date)===wk);
    const responded=wkData.filter(d=>d.status==='Completed'||d.status==='Skipped').length;
    const total=consultants.length||1; // Total possible respondents
    weekCompRate.push(Math.min(100,Math.round((responded/total)*100)));
  });

  h+=`<div class="card"><h3 style="margin-bottom:12px">Completion Rate by Week</h3><div class="chart-container">${lineChart(weekCompRate,wks,'var(--green)',140)}</div><div style="font-size:11px;color:var(--text3);margin-top:4px">% = (Submitted + Skipped) / Total Consultants. Skip counts as a response.</div></div>`;
  h+='</div>';

  // Non-responders table
  const respCounts={};
  consultants.forEach(c=>{respCounts[c]={name:c,responded:0,noResponse:0,total:0}});
  // Count by week presence
  const totalWeeks=wks.length||1;
  filtered.forEach(d=>{
    if(respCounts[d.consultant]){
      respCounts[d.consultant].total++;
      if(d.status==='Completed'||d.status==='Skipped')respCounts[d.consultant].responded++;
    }
  });
  const nonResp=Object.values(respCounts).map(c=>{
    c.noResponse=totalWeeks-c.responded;
    c.rate=totalWeeks>0?Math.round((c.responded/totalWeeks)*100):0;
    return c;
  }).sort((a,b)=>a.rate-b.rate);

  h+=`<div class="card"><div class="card-header"><h3>Response Rates by Consultant</h3><span class="card-sub">Sorted by lowest response rate</span></div>`;
  h+='<table class="usage-table"><thead><tr><th>Consultant</th><th>Responses</th><th>No Response</th><th>Rate</th></tr></thead><tbody>';
  nonResp.forEach(c=>{
    const color=c.rate>=80?'var(--green)':c.rate>=50?'var(--yellow)':'var(--red)';
    h+=`<tr><td style="font-weight:600;color:var(--text)">${esc(c.name)}</td><td class="mono">${c.responded}</td><td class="mono">${c.noResponse}</td><td><span style="color:${color};font-weight:600;font-family:var(--mono)">${c.rate}%</span><span class="rate-bar" style="width:60px"><span class="rate-fill" style="width:${c.rate}%;background:${color}"></span></span></td></tr>`;
  });
  h+='</tbody></table></div>';

  // Skip Summary (moved from Overview)
  const skips=filtered.filter(d=>d.status==='Skipped');
  if(skips.length>0){
    h+=`<div class="skip-summary"><div class="card-header"><h3>Skip Summary</h3><span class="card-sub">${skips.length} skipped — Skipping is OK! Better than ignoring.</span></div>`;
    skips.forEach(d=>{
      h+=`<div class="skip-row"><span style="font-weight:600;color:var(--text);min-width:140px">${esc(d.consultant)}</span><span style="color:var(--text3);min-width:120px">${esc(d.client)}</span><span style="color:var(--text2);flex:1">${esc(d.skipReason||'No reason given')}</span><span style="color:var(--text3);font-size:12px">${d.date?d.date.toLocaleDateString():''}</span></div>`;
    });
    h+='</div>';
  }

  document.getElementById('usageTab').innerHTML=h;
}

// ============================================================
// RENDER
// ============================================================
function render(){if(!dataLoaded)return;if(currentTab==='overview')renderOverview();else if(currentTab==='ai')renderAI();else if(currentTab==='meeting')renderMeeting();else if(currentTab==='detail')renderDetail();else if(currentTab==='usage')renderUsage()}

// AUTO-LOAD
loadData();

</script>
